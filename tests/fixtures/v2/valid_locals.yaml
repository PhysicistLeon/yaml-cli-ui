version: 2
imports:
  media: ./packs/media.yaml
  fs: ./packs/fs.yaml
profiles:
  home:
    workdir: "/work"
params:
  collection:
    type: string
    default: "incoming"
locals:
  run_root: "${profile.workdir}/runs/${params.collection}"
  spool_dir: "${locals.run_root}/spool"
  urls_file: "${locals.spool_dir}/urls.json"
  media_script: $media.locals.scrape_script
  ensure_script: $fs.locals.ensure_dir_script
  run_with_import: "${locals.run_root}/from-import-${fs.locals.ensure_dir_script}"
commands:
  noop_command:
    run:
      program: python
      argv:
        - -V
launchers:
  noop:
    title: Noop
    use: noop_command
