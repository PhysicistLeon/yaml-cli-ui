version: 2
commands:
  probe:
    run:
      program: python
      argv:
        - -c
        - "print('probe', '${$params.url}')"

  fetch_one:
    run:
      program: python
      argv:
        - -c
        - "print('fetch', '${$loop.item}')"

pipelines:
  shared_fetch:
    steps:
      - use: probe
      - foreach:
          in: "${$params.urls}"
          as: item
          steps: [fetch_one]
