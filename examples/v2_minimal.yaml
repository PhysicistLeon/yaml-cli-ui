version: 2

profiles:
  local:
    runtimes:
      python: "python"

params:
    username:
      type: string
      default: "Leon"


commands:
  hello_command:
    run:
      program: python
      argv:
        - -c
        - "print('hello from v2')"

  hello_username:
    run:
      program: python
      argv:
        - -c
        - "print('hello from v2 to ${params.username}')"

launchers:
  hello1:
    title: Hello
    info: Simple hello message
    use: hello_command
  hello2:
    title: Hello with name
    info: Simple hello message with username
    use: hello_username